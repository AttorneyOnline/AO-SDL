Outputs:
  IPv4Address:
    Description: >
      Elastic IP (IPv4). Create a DNS A record for your domain pointing here.
    Value: !Ref ElasticIP

  PublicIPv4:
    Description: >
      Same as above, for easy copy-paste into your DNS provider's A record.
    Value: !GetAtt Instance.PublicIp

  DNSSetup:
    Description: >
      Create these DNS records at your provider. For IPv6 (AAAA record),
      find the address in the EC2 console under the instance's network tab.
    Value: !Sub 'A record: ${Domain} -> ${ElasticIP}'

  GameURL:
    Description: Game server URL (available after DNS propagation)
    Value: !Sub 'https://${Domain}/'

  WebSocketWSS:
    Description: Secure WebSocket endpoint (same port as HTTPS)
    Value: !Sub 'wss://${Domain}/'

  GrafanaURL:
    Description: Grafana dashboard (available after DNS propagation)
    Value: !Sub 'https://${Domain}/grafana/'

  SSHCommand:
    Description: SSH into the server
    Value: !Sub 'ssh -i ~/.ssh/${KeyPairName}.pem ubuntu@${ElasticIP}'

  CloudWatchLogGroup:
    Description: CloudWatch log group for server logs
    Value: !Ref LogGroup
