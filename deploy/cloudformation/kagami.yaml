AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Kagami — Attorney Online game server. Deploys a fully configured instance
  with TLS, WebSocket support, observability stack, and CloudWatch logging.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: Pre-built Config (optional) }
        Parameters:
          - ConfigS3URL
      - Label: { default: Server Settings }
        Parameters:
          - ServerName
          - ServerDescription
          - Domain
          - ModPassword
          - MaxPlayers
          - MOTD
          - AssetURL
      - Label: { default: Master Server }
        Parameters:
          - AdvertiserEnabled
      - Label: { default: Observability }
        Parameters:
          - GrafanaPassword
      - Label: { default: "Content Moderation (optional)" }
        Parameters:
          - ContentModerationEnabled
          - OpenAIModerationApiKey
          - EmbeddingsHuggingFaceModelId
          - SlurWordlistURL
          - SlurAllowlistURL
          - SafeHintAnchorsURL
      - Label: { default: Infrastructure }
        Parameters:
          - InstanceType
          - UseSpotInstance
          - KeyPairName
          - KagamiImage
      - Label: { default: "DNS (optional)" }
        Parameters:
          - HostedZoneId
    ParameterLabels:
      ConfigS3URL: { default: "S3 URL for kagami.json (skips form below)" }
      ServerName: { default: "Server Name" }
      ServerDescription: { default: "Description" }
      Domain: { default: "Domain Name" }
      ModPassword: { default: "Moderator Password" }
      MaxPlayers: { default: "Maximum Players" }
      MOTD: { default: "Message of the Day" }
      AssetURL: { default: "Asset URL" }
      AdvertiserEnabled: { default: "List on master server?" }
      GrafanaPassword: { default: "Grafana Admin Password" }
      ContentModerationEnabled: { default: "Enable content moderation?" }
      OpenAIModerationApiKey: { default: "OpenAI moderation API key (optional)" }
      EmbeddingsHuggingFaceModelId: { default: "HuggingFace embedding model id (optional)" }
      SlurWordlistURL: { default: "Slur wordlist URL (optional)" }
      SlurAllowlistURL: { default: "Slur exception list URL (optional)" }
      SafeHintAnchorsURL: { default: "Safe-hint anchor list URL (optional)" }
      InstanceType: { default: "Instance Type" }
      UseSpotInstance: { default: "Use Spot Instance" }
      KagamiImage: { default: "Kagami container image (override)" }
      KeyPairName: { default: "SSH Key Pair" }
      HostedZoneId: { default: "Route53 Hosted Zone ID (auto-manages DNS)" }

Parameters:
  ConfigS3URL:
    Type: String
    Default: ''
    Description: >
      S3 URL to a pre-built kagami.json (e.g. s3://my-bucket/kagami.json).
      If set, the config is downloaded from S3 and the Server Settings
      fields below are ignored. The instance role has S3 read access.

  ServerName:
    Type: String
    Default: Kagami Server
    Description: Displayed in the server browser and in-game. Ignored if ConfigS3URL is set.

  ServerDescription:
    Type: String
    Default: ''
    Description: Short description shown in the server list. Ignored if ConfigS3URL is set.

  Domain:
    Type: String
    Default: example.com
    Description: >
      Your domain name. After stack creation, create an A record pointing
      to the Elastic IP shown in the Outputs tab. Ignored if ConfigS3URL is set.

  ModPassword:
    Type: String
    Default: ''
    NoEcho: true
    Description: Leave empty to disable simple auth.

  MaxPlayers:
    Type: Number
    Default: 100
    MinValue: 1
    MaxValue: 1000

  MOTD:
    Type: String
    Default: ''
    Description: Sent to players when they join.

  AssetURL:
    Type: String
    Default: ''
    Description: URL for custom content (characters, sounds). Leave empty if not hosting assets.

  AdvertiserEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

  GrafanaPassword:
    Type: String
    Default: changeme
    NoEcho: true
    MinLength: 6
    Description: Password for the Grafana admin dashboard at /grafana/.

  # --- Content Moderation (opt-in) ---
  #
  # Everything here is disabled by default. Enabling the subsystem alone
  # doesn't call out to anything — each sub-layer (unicode rules, URL
  # blocklist, remote classifier, embeddings) has its own enabled flag
  # inside kagami.json. These CFN params just forward secrets safely;
  # the actual layer on/off toggles live in the generated config.
  ContentModerationEnabled:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Turn on the content moderation subsystem. When false, no moderation
      layer runs and kagami_moderation_* metrics stay at zero. When true,
      the unicode and URL layers are enabled in the generated config; the
      remote classifier only activates if you also provide an API key.

  OpenAIModerationApiKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: >
      API key for OpenAI's omni-moderation-latest endpoint. Leave empty
      to keep the remote classifier layer disabled. Kagami only uses this
      key for moderation calls — it is NOT used for chat completions.

  EmbeddingsHuggingFaceModelId:
    Type: String
    Default: ''
    Description: >
      HuggingFace model id for the local embeddings layer, e.g.
      "sentence-transformers/all-MiniLM-L6-v2". Leave empty to keep the
      embeddings layer disabled. When set, the embeddings layer will
      fetch and load this model at startup (Phase 3 — not yet wired).

  SlurWordlistURL:
    Type: String
    Default: ''
    Description: >
      https URL of a newline-delimited slur wordlist for the Layer 1c
      word-boundary matcher. Leave empty to keep the layer inert. The
      wordlist is fetched once at startup, cached to disk, and matched
      against messages via a Scunthorpe-safe normalizer. Scope: extremist
      hate speech only — profanity and crudeness are expected to fall
      through to the remote classifier. A recommended public wordlist
      is published at
      https://kagami-deploy.s3.us-west-2.amazonaws.com/moderation/slurs.txt
      — review the contents before deploying, as this is a matter of
      community policy and every server will want different tradeoffs.

  SlurAllowlistURL:
    Type: String
    Default: ''
    Description: >
      https URL of a newline-delimited exception list. Tokens on this
      list are never reported as slur matches even if they appear in
      the wordlist, which is how we handle Scunthorpe-style false
      positives (country names, city names, reclaimed language used
      in-group). Fetched at startup with the same semantics as the
      wordlist URL. A recommended list is at
      https://kagami-deploy.s3.us-west-2.amazonaws.com/moderation/slur_exceptions.txt
      — again, review before using.

  SafeHintAnchorsURL:
    Type: String
    Default: ''
    Description: >
      https URL of a newline-delimited list of "obviously safe" anchor
      phrases used to short-circuit the Layer 2 (OpenAI) classifier
      call on mundane chatter. Each anchor is embedded once at
      startup; on the hot path, messages whose embedding exceeds
      0.7 cosine similarity to any anchor skip the remote call.
      Requires the embeddings layer to be enabled and a HuggingFace
      model id configured. A recommended starter list is at
      https://kagami-deploy.s3.us-west-2.amazonaws.com/moderation/safe_anchors.txt
      — review and tune per your community's typical chat style.

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small
      - t4g.medium
    Description: >
      Graviton (arm64) instances. t4g.small is recommended for game server
      + observability. t4g.nano works for game-only.

  KagamiImage:
    Type: String
    Default: ''
    Description: >
      Optional container image override. Blank = ghcr.io/attorneyonline/kagami:latest.
      Set to e.g. <acct>.dkr.ecr.<region>.amazonaws.com/kagami:dev to validate a
      dev build. Instance role has ECR read so no extra IAM needed.

  UseSpotInstance:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Spot instances are ~70% cheaper but can be interrupted with 2 min
      notice. Good for testing, not recommended for production servers
      with active players.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access.

  HostedZoneId:
    Type: String
    Default: ''
    Description: >
      Route53 hosted zone ID. If set, an A record for your domain is
      created automatically pointing to the Elastic IP. Leave empty
      to manage DNS manually at your provider.

Conditions:
  IsSpot: !Equals [!Ref UseSpotInstance, 'true']
  HasS3Config: !Not [!Equals [!Ref ConfigS3URL, '']]
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, '']]

Resources:
  # --- Security Group ---
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Kagami game server
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIpv6: '::/0'
          Description: SSH (IPv6)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (ACME challenges)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIpv6: '::/0'
          Description: HTTP (ACME challenges, IPv6)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS + WSS (REST API and AO2 WebSocket)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: '::/0'
          Description: HTTPS + WSS (IPv6)
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  # --- Elastic IP ---
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eip'

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref Instance

  # --- DNS (optional) ---
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref Domain
      Type: A
      TTL: 60
      ResourceRecords:
        - !Ref ElasticIP

  # --- CloudWatch ---
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/kagami/${AWS::StackName}'
      RetentionInDays: 7

  # --- IAM Role ---
  # (CloudWatchUser was removed — kagami uses IMDSv2 via the instance
  # role below for CloudWatch Logs access.)
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: KagamiInstancePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:DescribeLogGroups
                  - logs:GetLogEvents
                  - logs:FilterLogEvents
                  - logs:StartQuery
                  - logs:StopQuery
                  - logs:GetQueryResults
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # --- EC2 Instance ---
  SpotLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: IsSpot
    Properties:
      LaunchTemplateData:
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            SpotInstanceType: persistent
            InstanceInterruptionBehavior: stop

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', arm64]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SecurityGroupIds: [!Ref SecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      LaunchTemplate:
        !If
          - IsSpot
          - LaunchTemplateId: !Ref SpotLaunchTemplate
            Version: !GetAtt SpotLaunchTemplate.LatestVersionNumber
          - !Ref AWS::NoValue
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 12
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}'
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -euo pipefail
              exec > /var/log/kagami-init.log 2>&1

              echo "=== Kagami CloudFormation Init ==="

              # --- CF parameters exported for the Python generator below ---
              # User-supplied values; read via os.environ inside the quoted
              # heredoc so shell metacharacters can't break anything.
              CF_CONFIG_S3="${CfConfigS3URL}"
              export CF_CONFIG_S3="${CfConfigS3URL}"
              export CF_DOMAIN="${CfDomain}"
              export CF_SERVER_NAME="${CfServerName}"
              export CF_SERVER_DESC="${CfServerDescription}"
              export CF_MAX_PLAYERS="${CfMaxPlayers}"
              export CF_MOTD="${CfMOTD}"
              export CF_ASSET_URL="${CfAssetURL}"
              export CF_MOD_PASSWORD="${CfModPassword}"
              export CF_ADVERTISE="${CfAdvertiserEnabled}"
              export CF_GRAFANA_PASSWORD="${CfGrafanaPassword}"
              export CF_KAGAMI_IMAGE="${CfKagamiImage}"
              export CF_CW_REGION="${CfRegion}"
              export CF_CW_LOG_GROUP="${CfLogGroup}"
              # CloudWatch creds come from IMDSv2 at runtime; no static keys here.
              export CF_CM_ENABLED="${CfCmEnabled}"
              export CF_OPENAI_KEY="${CfOpenAIKey}"
              export CF_EMBED_MODEL="${CfEmbedModel}"
              export CF_SLUR_WORDLIST="${CfSlurWordlist}"
              export CF_SLUR_EXCEPTIONS="${CfSlurExceptions}"
              export CF_SAFE_HINT_URL="${CfSafeHintUrl}"

              # --- Install AWS CLI (for S3 config download) ---
              if ! command -v aws &>/dev/null; then
                  apt-get update -qq
                  apt-get install -y -qq unzip curl
                  curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o /tmp/awscliv2.zip
                  cd /tmp && unzip -qo awscliv2.zip && ./aws/install
                  cd /
              fi

              # --- Install SSM agent (for CI deploys via SSM Run Command) ---
              if ! systemctl is-active --quiet amazon-ssm-agent 2>/dev/null; then
                  snap install amazon-ssm-agent --classic 2>/dev/null || true
                  systemctl enable --now snap.amazon-ssm-agent.amazon-ssm-agent.service 2>/dev/null || true
              fi

              # --- Install Docker ---
              if ! command -v docker &>/dev/null; then
                  curl -fsSL https://get.docker.com | sh
                  usermod -aG docker ubuntu
              fi
              if ! docker compose version &>/dev/null 2>&1; then
                  apt-get update -qq
                  apt-get install -y -qq docker-compose-plugin
              fi

              # --- Install nftables ---
              apt-get install -y -qq nftables

              # --- Docker seccomp for io_uring ---
              if [ ! -f /etc/docker/daemon.json ] || ! grep -q seccomp /etc/docker/daemon.json 2>/dev/null; then
                  echo '{ "seccomp-profile": "unconfined" }' > /etc/docker/daemon.json
                  systemctl restart docker
              fi

              # --- Deploy directory ---
              mkdir -p /opt/kagami/config /opt/kagami/prometheus
              touch /opt/kagami/kagami.db
              chown -R ubuntu:ubuntu /opt/kagami
              cd /opt/kagami

              # --- kagami.json: download from S3 or generate from form ---
              if [ -n "$CF_CONFIG_S3" ]; then
                  echo "Downloading kagami.json from $CF_CONFIG_S3"
                  aws s3 cp "$CF_CONFIG_S3" kagami.json
                  # Read domain and grafana password from the downloaded
                  # config for Caddyfile/.env. The Python one-liners are
                  # safe here because the arguments are literal filenames
                  # from a trusted source (S3) — no user-supplied content
                  # flows through shell into Python.
                  CF_DOMAIN=$(python3 -c 'import json; print(json.load(open("kagami.json")).get("domain",""))')
                  CF_GRAFANA_PASSWORD=$(python3 -c 'import json; print(json.load(open("kagami.json")).get("deploy",{}).get("grafana_password","changeme"))')
                  export CF_DOMAIN CF_GRAFANA_PASSWORD
              else
              # Download the kagami.json generator from S3 and run it.
              # The script lives outside the template so UserData stays
              # under EC2's 25600-byte limit. It reads the CF_* env vars
              # exported above and writes kagami.json in the current dir.
              aws s3 cp s3://kagami-deploy/cloudformation/generate-kagami-config.py /tmp/gen-kagami-config.py
              python3 /tmp/gen-kagami-config.py
              fi

              # --- Generate .env ---
              # Written via Python so a password containing '#', '"', '$',
              # or backticks doesn't get mis-parsed by docker compose's
              # env file reader. Python json-escapes nothing — we want
              # raw strings — but using env vars + Python avoids the
              # shell heredoc interpolation entirely.
              python3 <<'ENVEOF'
              import os
              with open('.env', 'w') as f:
                  f.write(f"KAGAMI_DOMAIN={os.environ.get('CF_DOMAIN','')}\n")
                  # KAGAMI_IMAGE: CFN KagamiImage param, or public GHCR default.
                  kagami_image = os.environ.get('CF_KAGAMI_IMAGE', '').strip() or 'ghcr.io/attorneyonline/kagami:latest'
                  f.write(f"KAGAMI_IMAGE={kagami_image}\n")
                  f.write("GRAFANA_ADMIN_USER=admin\n")
                  f.write(f"GRAFANA_ADMIN_PASSWORD={os.environ.get('CF_GRAFANA_PASSWORD','changeme')}\n")
              ENVEOF

              # --- Generate Caddyfile ---
              cat > Caddyfile <<'CADDY'
              {
              	servers :443 {
              		timeouts {
              			read_header 10s
              			read_body   30s
              			idle        120s
              		}
              	}
              }
              (tls_active) {
              }
              {$KAGAMI_DOMAIN} {
              	import tls_active
              	request_body {
              		max_size 64KB
              	}
              	@websocket {
              		header Connection *Upgrade*
              		header Upgrade    websocket
              		not path /grafana*
              	}
              	handle @websocket {
              		reverse_proxy 127.0.0.1:27016
              	}
              	handle /grafana* {
              		reverse_proxy 127.0.0.1:3000
              	}
              	handle /prometheus* {
              		respond "Forbidden" 403
              	}
              	handle /metrics {
              		@allowed remote_ip 127.0.0.1 ::1
              		handle @allowed {
              			reverse_proxy 127.0.0.1:8080
              		}
              		respond "Forbidden" 403
              	}
              	handle {
              		reverse_proxy 127.0.0.1:8080 {
              			transport http {
              				keepalive 60s
              				keepalive_idle_conns 64
              				max_conns_per_host 256
              				read_timeout  30s
              				write_timeout 30s
              			}
              		}
              	}
              }
              http://{$KAGAMI_DOMAIN} {
              	@websocket {
              		header Connection *Upgrade*
              		header Upgrade    websocket
              		not path /grafana*
              	}
              	handle @websocket {
              		reverse_proxy 127.0.0.1:27016
              	}
              	handle {
              		redir https://{host}{uri} permanent
              	}
              }
              CADDY

              # --- Generate docker-compose.yml ---
              cat > docker-compose.yml <<'COMPOSE'
              services:
                caddy:
                  image: caddy:latest
                  restart: unless-stopped
                  network_mode: host
                  env_file: .env
                  volumes:
                    - ./Caddyfile:/etc/caddy/Caddyfile:ro
                    - caddy_data:/data
                    - caddy_config:/config
                  depends_on: [kagami]
                kagami:
                  image: $KAGAMI_IMAGE
                  restart: unless-stopped
                  network_mode: host
                  cap_add: [NET_ADMIN]
                  volumes:
                    - ./kagami.json:/app/kagami.json
                    - ./config:/app/config:ro
                    - ./kagami.db:/app/kagami.db
                    - kagami_logs:/logs
                    # Persistent cache for slur lists + HF embedding model.
                    - moderation_cache:/opt/kagami/moderation-cache
                prometheus:
                  image: prom/prometheus:latest
                  restart: unless-stopped
                  network_mode: host
                  volumes:
                    - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                    - prometheus_data:/prometheus
                  command: ['--config.file=/etc/prometheus/prometheus.yml','--storage.tsdb.retention.time=24h','--storage.tsdb.retention.size=1GB','--web.external-url=/prometheus/','--web.route-prefix=/prometheus/','--web.listen-address=127.0.0.1:9090']
                  depends_on: [kagami]
                loki:
                  image: grafana/loki:latest
                  restart: unless-stopped
                  # Loki listens on 3100, bound to loopback only so it's
                  # reachable from kagami + grafana on the host network
                  # but NOT from the public internet (Caddy doesn't
                  # forward 3100 externally).
                  network_mode: host
                  volumes:
                    - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
                    - loki_data:/loki
                  command: ['-config.file=/etc/loki/local-config.yaml']
                grafana:
                  image: grafana/grafana:latest
                  restart: unless-stopped
                  network_mode: host
                  env_file: .env
                  environment:
                    - GF_SECURITY_ADMIN_USER=admin
                    - GF_SECURITY_ADMIN_PASSWORD=$GRAFANA_ADMIN_PASSWORD
                    - GF_USERS_ALLOW_SIGN_UP=false
                    - GF_AUTH_ANONYMOUS_ENABLED=false
                    - GF_SERVER_ROOT_URL=https://$KAGAMI_DOMAIN/grafana/
                    - GF_SERVER_SERVE_FROM_SUB_PATH=true
                    - GF_SERVER_HTTP_ADDR=127.0.0.1
                    - GF_SERVER_HTTP_PORT=3000
                  volumes:
                    - grafana_data:/var/lib/grafana
                    - ./grafana/provisioning:/etc/grafana/provisioning:ro
                  depends_on: [prometheus]
              volumes:
                caddy_data:
                caddy_config:
                kagami_logs:
                moderation_cache:
                prometheus_data:
                grafana_data:
                loki_data:
              COMPOSE

              # --- Loki config ---
              # Minimal single-process Loki with filesystem storage.
              # Retention is 7 days to match the CloudWatch log group;
              # ingestion tuned for low-latency (1s) not throughput.
              mkdir -p loki
              cat > loki/loki-config.yaml <<'LOKI'
              auth_enabled: false
              server:
                http_listen_address: 127.0.0.1
                http_listen_port: 3100
                grpc_listen_address: 127.0.0.1
                grpc_listen_port: 9096
                log_level: warn
              common:
                path_prefix: /loki
                storage:
                  filesystem:
                    chunks_directory: /loki/chunks
                    rules_directory: /loki/rules
                replication_factor: 1
                ring:
                  instance_addr: 127.0.0.1
                  kvstore:
                    store: inmemory
              schema_config:
                configs:
                  - from: 2025-01-01
                    store: tsdb
                    object_store: filesystem
                    schema: v13
                    index:
                      prefix: index_
                      period: 24h
              limits_config:
                reject_old_samples: true
                reject_old_samples_max_age: 168h
                max_query_series: 5000
              table_manager:
                retention_deletes_enabled: true
                retention_period: 168h
              LOKI

              # --- Prometheus config ---
              cat > prometheus/prometheus.yml <<'PROM'
              global:
                scrape_interval: 15s
              scrape_configs:
                - job_name: kagami
                  static_configs:
                    - targets: ['127.0.0.1:8080']
              PROM

              # --- Download content config from repo ---
              CBASE=https://raw.githubusercontent.com/AttorneyOnline/AO-SDL/master/deploy
              curl -fsSL $CBASE/config/characters.txt -o config/characters.txt || true
              curl -fsSL $CBASE/config/music.json -o config/music.json || true
              curl -fsSL $CBASE/config/areas.ini -o config/areas.ini || true
              curl -fsSL $CBASE/config/backgrounds.txt -o config/backgrounds.txt || true

              # --- Download Grafana provisioning from repo ---
              mkdir -p grafana/provisioning/dashboards grafana/provisioning/datasources
              curl -fsSL $CBASE/grafana/provisioning/dashboards/kagami-overview.json \
                  -o grafana/provisioning/dashboards/kagami-overview.json || true
              curl -fsSL $CBASE/grafana/provisioning/dashboards/kagami-moderation.json \
                  -o grafana/provisioning/dashboards/kagami-moderation.json || true
              # Dashboard provider config
              cat > grafana/provisioning/dashboards/default.yaml <<'DASHPROV'
              apiVersion: 1
              providers:
                - name: default
                  type: file
                  options:
                    path: /etc/grafana/provisioning/dashboards
              DASHPROV
              # Prometheus datasource
              cat > grafana/provisioning/datasources/prometheus.yaml <<'DSPROV'
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  access: proxy
                  url: http://127.0.0.1:9090/prometheus
                  isDefault: true
              DSPROV
              # CloudWatch datasource (uses instance role — no keys needed)
              cat > grafana/provisioning/datasources/cloudwatch.yaml <<'CWPROV'
              apiVersion: 1
              datasources:
                - name: CloudWatch
                  type: cloudwatch
                  uid: cloudwatch
                  access: proxy
                  jsonData:
                    authType: default
                    defaultRegion: us-west-2
              CWPROV
              # Loki datasource. Kagami application logs push here via
              # the `loki_url` config knob, and the moderation audit log
              # has its own dedicated stream (job=kagami_mod_audit) for
              # low-latency live tailing of mod events — the CloudWatch
              # audit stream stays as the queryable archive-of-record.
              cat > grafana/provisioning/datasources/loki.yaml <<'LOKIPROV'
              apiVersion: 1
              datasources:
                - name: Loki
                  type: loki
                  uid: loki
                  access: proxy
                  url: http://127.0.0.1:3100
                  jsonData:
                    maxLines: 1000
              LOKIPROV

              # --- Fix ownership and start ---
              chown -R ubuntu:ubuntu /opt/kagami
              # ECR login (only when KagamiImage is a *.dkr.ecr.* URI).
              if echo "$CF_KAGAMI_IMAGE" | grep -q 'dkr.ecr'; then
                  ECR_REGISTRY=$(echo "$CF_KAGAMI_IMAGE" | cut -d/ -f1)
                  ECR_REGION=$(echo "$ECR_REGISTRY" | sed -n 's/.*\.dkr\.ecr\.\([^.]*\)\.amazonaws\.com/\1/p')
                  aws ecr get-login-password --region "$ECR_REGION" | \
                      sudo -u ubuntu docker login --username AWS --password-stdin "$ECR_REGISTRY"
              fi
              sudo -u ubuntu docker compose pull
              sudo -u ubuntu docker compose up -d

              echo "=== Kagami init complete ==="
            - CfConfigS3URL: !Ref ConfigS3URL
              CfDomain: !Ref Domain
              CfServerName: !Ref ServerName
              CfServerDescription: !Ref ServerDescription
              CfMaxPlayers: !Ref MaxPlayers
              CfMOTD: !Ref MOTD
              CfAssetURL: !Ref AssetURL
              CfModPassword: !Ref ModPassword
              CfAdvertiserEnabled: !Ref AdvertiserEnabled
              CfGrafanaPassword: !Ref GrafanaPassword
              CfRegion: !Ref AWS::Region
              CfLogGroup: !Sub '/kagami/${AWS::StackName}'
              CfKagamiImage: !Ref KagamiImage
              CfCmEnabled: !Ref ContentModerationEnabled
              CfOpenAIKey: !Ref OpenAIModerationApiKey
              CfEmbedModel: !Ref EmbeddingsHuggingFaceModelId
              CfSlurWordlist: !Ref SlurWordlistURL
              CfSlurExceptions: !Ref SlurAllowlistURL
              CfSafeHintUrl: !Ref SafeHintAnchorsURL

