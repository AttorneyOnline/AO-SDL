# Kagami firewall configuration
# Sourced by kagami-firewall.sh before applying ip6tables rules.
# Uncomment and adjust values as needed.

# Ports
# KAGAMI_HTTPS_PORT=443
# KAGAMI_WS_PORT=27015
# KAGAMI_HTTP_PORT=80

# SYN flood protection (per source IP)
# KAGAMI_SYN_RATE=50/sec
# KAGAMI_SYN_BURST=100

# Max concurrent connections from a single IP
# KAGAMI_CONN_LIMIT=100

# Per-port new connection rate (per source IP)
# KAGAMI_HTTPS_CONN_RATE=200/sec
# KAGAMI_HTTPS_CONN_BURST=500
# KAGAMI_WS_CONN_RATE=20/sec
# KAGAMI_WS_CONN_BURST=40

# ICMP flood protection
# KAGAMI_ICMP_RATE=10/sec
# KAGAMI_ICMP_BURST=20
