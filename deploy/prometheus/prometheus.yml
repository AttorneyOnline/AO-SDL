global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Staging game server (scraped via HTTPS through Caddy)
  - job_name: kagami-ecs
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ['kagami.yuurei.network:443']
        labels:
          instance: staging-ecs
