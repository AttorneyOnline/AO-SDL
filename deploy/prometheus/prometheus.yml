global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: kagami
    metrics_path: /metrics
    static_configs:
      - targets: ['kagami:80']
        labels:
          instance: canary

  - job_name: kagami-ecs
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ['kagami.yuurei.network:443']
        labels:
          instance: staging-ecs
