services:
  # --- Reverse proxy + TLS ---
  caddy:
    image: ${CADDY_IMAGE:-caddy:latest}
    restart: unless-stopped
    network_mode: host
    environment:
      - KAGAMI_DOMAIN=${KAGAMI_DOMAIN:-canary.yuurei.network}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - kagami

  # --- Game server ---
  kagami:
    image: ${KAGAMI_IMAGE:-ghcr.io/attorneyonline/kagami:latest}
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN  # Required for kagami-fw-helper nftables operations
    volumes:
      - ./kagami.json:/app/kagami.json
      - ./config:/app/config:ro
      - kagami_logs:/logs

  # --- Metrics ---
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=24h'
      - '--storage.tsdb.retention.size=1GB'
      - '--storage.tsdb.min-block-duration=30m'
      - '--storage.tsdb.max-block-duration=1h'
      - '--web.external-url=/prometheus/'
      - '--web.route-prefix=/prometheus/'
      - '--web.listen-address=127.0.0.1:9090'
    depends_on:
      - kagami

  # --- Log aggregation ---
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - loki_data:/loki
    command:
      - '-config.expand-env=true'
      - '-config.file=/etc/loki/local-config.yaml'

  # --- Dashboards ---
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_RBAC_PERMISSION_CACHE=false
      - GF_USERS_EDITORS_CAN_ADMIN=true
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SERVER_ROOT_URL=https://${KAGAMI_DOMAIN:-canary.yuurei.network}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_HTTP_ADDR=127.0.0.1
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

volumes:
  caddy_data:
  caddy_config:
  kagami_logs:
  prometheus_data:
  loki_data:
  grafana_data:
