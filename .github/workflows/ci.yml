name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

jobs:
  # ---- Formatting check (fast, Linux-only) ----
  formatting:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14
      - name: Check formatting
        run: |
          find engine plugins apps/sdl include platform tests \
            -name '*.cpp' -o -name '*.h' -o -name '*.mm' | \
            xargs clang-format-14 --dry-run --Werror

  # ---- Build, test, and package per OS ----
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            cmake_args: -DCMAKE_BUILD_TYPE=Release
            coverage: true

          - name: macOS
            os: macos-latest
            cmake_args: -DCMAKE_BUILD_TYPE=Release

          - name: Windows
            os: windows-latest
            cmake_args: -DCMAKE_BUILD_TYPE=Release -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON
            cmake_generator: -G Ninja

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Platform dependencies ----
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libglew-dev libssl-dev

      - name: Install dependencies (Linux, coverage)
        if: matrix.coverage
        run: sudo apt-get install -y lcov

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ---- Configure ----
      - name: Configure
        run: cmake -B build ${{ matrix.cmake_generator }} ${{ matrix.cmake_args }}

      - name: Configure (coverage)
        if: matrix.coverage
        run: cmake -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage"

      # ---- Build ----
      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Build (coverage)
        if: matrix.coverage
        run: cmake --build build-coverage --target aosdl_tests --config Debug --parallel

      # ---- Test ----
      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --build-config Release

      - name: Run tests (coverage)
        if: matrix.coverage
        working-directory: build-coverage
        run: ctest --output-on-failure --build-config Debug

      # ---- Coverage report ----
      - name: Generate coverage report
        if: matrix.coverage
        run: |
          lcov --capture --directory build-coverage --output-file coverage.info \
               --ignore-errors mismatch,gcov,negative
          lcov --remove coverage.info \
               '/usr/*' '*/third-party/*' '*/tests/*' '*/build-coverage/*' \
               --output-file coverage.info \
               --ignore-errors unused,negative
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          fail_ci_if_error: false

      # ---- Package artifacts ----
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifact
          cp build/apps/sdl/aosdl artifact/
          tar czf aosdl-linux-x64.tar.gz -C artifact .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifact
          cp build/apps/sdl/aosdl artifact/
          codesign --force --sign - artifact/aosdl
          tar czf aosdl-macos-arm64.tar.gz -C artifact .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifact
          cp build/apps/sdl/Release/aosdl.exe artifact/
          cp build/apps/sdl/Release/*.dll artifact/ 2>/dev/null || true
          cp third-party/glew/bin/Release/x64/glew32.dll artifact/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aosdl-${{ runner.os }}
          path: |
            aosdl-*.tar.gz
            artifact/
