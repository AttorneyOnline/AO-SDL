name: Qt Frontend

on:
  push:
    branches:
      - qt-frontend
  pull_request:
    branches:
      - qt-frontend

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest

          - name: Linux
            os: ubuntu-latest

          - name: macOS
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- Qt ----
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.*'
          cache: true

      # ---- Platform dependencies ----
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglew-dev libgl-dev ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress -y

      # ---- Python (schema generation) ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Locate Python for CMake
        id: python-path
        run: echo "executable=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_OUTPUT"
        shell: bash

      # ---- Configure ----
      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DAO_BUILD_QT=ON
          -DAO_BUILD_SDL=OFF
          -DPython3_EXECUTABLE=${{ steps.python-path.outputs.executable }}

      # ---- Build ----
      - name: Build
        run: cmake --build build --config Release --parallel 4 --target aoqt

      # ---- Package (Windows) — windeployqt + zip ----
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifact
          cp build/apps/qt/aoqt.exe artifact/

          # GLEW is vendored — copy its runtime DLL
          cp third-party/glew/bin/Release/x64/glew32.dll artifact/ 2>/dev/null || true

          # Copy OpenSSL DLLs if present (installed by aqt)
          cp "$Qt6_DIR/../../../bin/libssl-3-x64.dll"    artifact/ 2>/dev/null || \
          cp "/c/Program Files/OpenSSL/bin/libssl-3-x64.dll" artifact/ 2>/dev/null || true
          cp "$Qt6_DIR/../../../bin/libcrypto-3-x64.dll"  artifact/ 2>/dev/null || \
          cp "/c/Program Files/OpenSSL/bin/libcrypto-3-x64.dll" artifact/ 2>/dev/null || true

          # windeployqt bundles Qt runtimes, QML modules, and plugins.
          # --qmldir must include both the source tree (for screen/panel QML)
          # and the build output (for generated AO.Components / AO.Panels qmldir files).
          windeployqt \
            --qmldir apps/qt/qml \
            --qmldir build/apps/qt/qml \
            --release \
            --no-compiler-runtime \
            artifact/aoqt.exe

          # Zip the whole artifact folder
          cd artifact
          7z a ../aoqt-windows-x64.zip .

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: aoqt-windows-x64
          path: aoqt-windows-x64.zip

      # ---- Package (Linux) ----
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifact
          cp build/apps/qt/aoqt artifact/
          strip artifact/aoqt
          tar czf aoqt-linux-x64.tar.gz -C artifact .

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: aoqt-linux-x64
          path: aoqt-linux-x64.tar.gz

      # ---- Package (macOS) ----
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/apps/qt/aoqt.app -dmg
          mv build/apps/qt/aoqt.dmg aoqt-macos.dmg

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: aoqt-macos
          path: aoqt-macos.dmg
