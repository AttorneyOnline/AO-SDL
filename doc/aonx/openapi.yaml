openapi: 3.1.0
info:
  title: AONX Protocol
  version: "1"
  description: |
    REST API specification for the AONX protocol, the successor to the AO2 client-server protocol.

tags:
  - name: Session
    description: Session lifecycle — create, renew, and delete sessions.
  - name: Server
    description: Server metadata and status.
  - name: Character
    description: Character listing and manifest retrieval.
  - name: Asset
    description: Content-addressed asset retrieval.

servers:
  - url: "{scheme}://{host}/aonx/v1"
    variables:
      scheme:
        default: https
        enum: [https, http]
      host:
        default: example.com

paths:
  /session:
    post:
      tags: [Session]
      operationId: createSession
      summary: Create Session
      description: |
        Create a new session. Returns a session token used for all subsequent requests.
        Authentication is optional and server-dependent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_name, client_version, hdid]
              properties:
                auth:
                  type: string
                  description: Authentication token. Format is TBD and server-dependent. Omitted for anonymous sessions.
                hdid:
                  type: string
                  description: |
                    Hardware identifier. SHA-256 hash of a string in the format:
                    `client_name:platform:platform_specific_fingerprint`
                client_name:
                  type: string
                  description: Client software name.
                client_version:
                  type: string
                  description: Client software version.
      responses:
        "200":
          description: Session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Session token. Used in all subsequent requests.
                  expires_at:
                    type: string
                    format: date-time
                    description: When the token expires (ISO 8601).
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Server-assigned user identifier.
                      display_name:
                        type: string
                        description: Display name.
                      roles:
                        type: array
                        items:
                          type: string
                        description: Server-assigned roles (e.g. "player", "moderator").
        "400":
          description: Missing required fields (`client_name`, `client_version`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Auth token provided but rejected (bad signature, expired, unknown format).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User is banned from this server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Server is full.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      tags: [Session]
      operationId: renewSession
      summary: Renew Session
      description: Extend the current session's lifetime.
      security:
        - sessionToken: []
      responses:
        "200":
          description: Session extended.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: New session token (may be the same or rotated).
                  expires_at:
                    type: string
                    format: date-time
                    description: New expiration time.
        "401":
          description: Token is invalid or already expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Session]
      operationId: deleteSession
      summary: Delete Session
      description: End the session. Invalidates the token immediately.
      security:
        - sessionToken: []
      responses:
        "204":
          description: Session deleted.
        "401":
          description: Token is invalid or already expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /server/players:
    get:
      tags: [Server]
      operationId: getPlayerCount
      summary: Player Count
      description: Returns the current and maximum player count.
      responses:
        "200":
          description: Player count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  online:
                    type: integer
                    description: Number of players currently connected.
                  max:
                    type: integer
                    description: Maximum player capacity.

  /server/motd:
    get:
      tags: [Server]
      operationId: getMotd
      summary: Message of the Day
      description: Returns the server's message of the day.
      responses:
        "200":
          description: Message of the day.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Message of the day. May be empty.

  /characters:
    get:
      tags: [Character]
      operationId: listCharacters
      summary: List Characters
      description: Returns the list of characters available on this server.
      security:
        - sessionToken: []
      responses:
        "200":
          description: Character list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  characters:
                    type: array
                    items:
                      type: object
                      properties:
                        char_id:
                          type: string
                          description: SHA-256 hash of the character manifest.
                        available:
                          type: boolean
                          description: Whether this character is available for selection.

  /asset/{hash}:
    get:
      tags: [Asset]
      operationId: getAsset
      summary: Get Asset
      description: |
        Fetch a content-addressed asset by its SHA-256 hash.
        Returns the raw file bytes. Infinitely cacheable.
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
          description: SHA-256 hash of the asset.
      responses:
        "200":
          description: Asset data.
          headers:
            Cache-Control:
              schema:
                type: string
              description: "public, immutable, max-age=31536000"
            ETag:
              schema:
                type: string
              description: The content hash.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Asset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /characters/{char_id}:
    get:
      tags: [Character]
      operationId: getCharacter
      summary: Get Character
      description: Returns the full manifest for a character.
      security:
        - sessionToken: []
      parameters:
        - name: char_id
          in: path
          required: true
          schema:
            type: string
          description: SHA-256 hash of the character manifest.
      responses:
        "200":
          description: Character manifest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterManifest"
        "404":
          description: Character not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    sessionToken:
      type: http
      scheme: bearer
      description: Session token returned by POST /aonx/v1/session.

  schemas:
    CharacterManifest:
      type: object
      properties:
        id:
          type: string
          description: Human-readable identifier (e.g. "saturday/phoenix-wright").
        name:
          type: string
          description: Display name (e.g. "Phoenix Wright").
        icon:
          type: string
          description: Filename of the character icon within the bundle.
        defaults:
          type: object
          properties:
            side:
              type: string
              description: Default court position (e.g. "def", "pro", "wit").
            blip:
              type: string
              description: Default blip sound category (e.g. "male", "female").
        emotes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: Emote display name.
              idle:
                type: string
                description: Filename of the idle animation.
              talking:
                type: string
                description: Filename of the talking animation.
              button:
                type: string
                description: Filename of the emote picker button image.
              desk:
                type: string
                description: Desk visibility ("show" or "hide").
              sfx:
                type: object
                properties:
                  file:
                    type: string
                  delay_ms:
                    type: integer
                  loop:
                    type: boolean
              pre_animation:
                type: object
                properties:
                  file:
                    type: string
                  duration_ms:
                    type: integer
              frame_effects:
                type: array
                items:
                  type: object
                  properties:
                    frame:
                      type: integer
                    type:
                      type: string
                      description: Effect type (e.g. "sfx", "screenshake", "realization").
                    file:
                      type: string
                      description: Asset filename, if applicable.
        files:
          type: object
          additionalProperties:
            type: string
          description: Map of filename to SHA-256 content hash for every file in the bundle.

    Error:
      type: object
      properties:
        reason:
          type: string
          description: Human-readable explanation. May be empty.
